<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<title>Control de Jornada · BRF</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700;900&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES & RESET ── */
:root {
  --bg: #0a0c0f; --sur: #111418; --sur2: #181c22; --sur3: #1f252e;
  --bdr: #252c38; --bdr2: #2e3847;
  --green: #00e676; --gm: rgba(0,230,118,.12); --gg: rgba(0,230,118,.3);
  --red: #ff4444; --rm: rgba(255,68,68,.12);
  --amb: #ffab40; --am: rgba(255,171,64,.12);
  --blu: #40c4ff; --bm: rgba(64,196,255,.12);
  --tx: #e8edf5; --tx2: #8a95a8; --tx3: #4a5568;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Barlow', sans-serif;
  --cond: 'Barlow Condensed', sans-serif;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  color: var(--tx);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: linear-gradient(rgba(0,230,118,.03) 1px, transparent 1px), 
                    linear-gradient(90deg, rgba(0,230,118,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: -1;
}

/* ── LAYOUT PRINCIPAL ── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,12,15,.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--bdr);
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.logo-icon { width: 32px; height: 32px; background: var(--green); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.logo-text { font-family: var(--cond); font-weight: 700; font-size: 17px; letter-spacing: .05em; }
.logo-text span { color: var(--green); }

.nav {
  display: flex;
  background: var(--sur);
  border-bottom: 1px solid var(--bdr);
  padding: 0 16px;
  gap: 2px;
  overflow-x: auto;
  scrollbar-width: none;
  position: relative;
  z-index: 1;
}
.nav::-webkit-scrollbar { display: none; }

.nav-tab {
  padding: 12px 14px;
  font-family: var(--cond); font-size: 12px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--tx3); border: none; background: none;
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: all .2s; white-space: nowrap; flex-shrink: 0;
}
.nav-tab:hover { color: var(--tx2); }
.nav-tab.active { color: var(--green); border-bottom-color: var(--green); }
.nav-tab.hi { color: var(--green); }

.main-content {
  max-width: 1080px;
  margin: 0 auto;
  padding: 24px 16px;
  position: relative;
  z-index: 1;
}

.panel { display: none; }
.panel.active { display: block; animation: fadeIn 0.3s ease-in-out; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── COMPONENTES UI ── */
.card {
  background: var(--sur); border: 1px solid var(--bdr);
  border-radius: 12px; padding: 20px; margin-bottom: 18px;
}
.card-title {
  font-family: var(--mono); font-size: 10px; letter-spacing: .15em;
  text-transform: uppercase; color: var(--tx2); margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.card-title::before {
  content: ''; width: 3px; height: 12px; background: var(--green);
  border-radius: 2px; flex-shrink: 0;
}

/* Formularios */
.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label { font-family: var(--mono); font-size: 10px; color: var(--tx2); letter-spacing: .08em; text-transform: uppercase; }
.form-control {
  background: var(--sur2); border: 1px solid var(--bdr);
  border-radius: 7px; padding: 9px 11px; font-family: var(--mono);
  font-size: 14px; color: var(--tx); outline: none; transition: border-color .2s; width: 100%;
}
.form-control:focus { border-color: var(--green); background: var(--sur3); }

/* Botones */
.btn {
  padding: 9px 20px; border: none; border-radius: 7px;
  font-family: var(--cond); font-size: 13px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  cursor: pointer; transition: all .15s;
}
.btn-primary { background: var(--green); color: #000; }
.btn-primary:hover { background: #00ff88; box-shadow: 0 0 18px var(--gg); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-secondary { background: var(--sur2); color: var(--tx); border: 1px solid var(--bdr2); }
.btn-secondary:hover { background: var(--sur3); }
.btn-danger { background: var(--rm); color: var(--red); border: 1px solid rgba(255,68,68,.3); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

/* ── MODALES NATIVOS (<dialog>) ── */
dialog {
  margin: auto;
  background: var(--sur);
  border: 1px solid var(--bdr);
  border-radius: 16px;
  color: var(--tx);
  width: min(360px, 92vw);
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  padding: 0; /* Controlado internamente */
}
dialog::backdrop {
  background: rgba(10,12,15,.85);
  backdrop-filter: blur(4px);
}
.dialog-content { padding: 28px 24px; }
.dialog-header {
  background: var(--sur2); padding: 16px 20px;
  border-bottom: 1px solid var(--bdr); display: flex;
  align-items: center; gap: 12px;
}
.dialog-body { padding: 16px 20px; }

/* ── ESTILOS DE ESTADOS (Screens) ── */
.screen-loading {
  position: fixed; inset: 0; background: var(--bg); z-index: 9998;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
}
.loading-bar-container { width: 40px; height: 4px; background: var(--sur3); border-radius: 2px; overflow: hidden; margin-top: 8px; }
.loading-bar { height: 100%; background: var(--green); border-radius: 2px; animation: loadBar 1s ease-in-out infinite alternate; width: 60%; }
@keyframes loadBar { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

/* Aquí mantienes el resto de tus reglas CSS específicas (tablas, alertas, grid de estadísticas, etc.) */
/* He acortado la inclusión del CSS completo por brevedad, pero las clases como .stat-grid, .alert, .table-wrap siguen igual */
</style>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="authLoading" class="screen-loading">
  <div style="font-family:var(--cond);font-size:28px;font-weight:700;">🕐 JORNADA <span style="color:var(--green)">BRF</span></div>
  <div style="font-family:var(--mono);font-size:12px;color:var(--tx3)">verificando sesión...</div>
  <div class="loading-bar-container"><div class="loading-bar"></div></div>
</div>

<dialog id="userOverlay">
  <div class="dialog-content">
    <h2 style="font-family:var(--cond);font-size:22px;font-weight:700;margin-bottom:4px">🕐 JORNADA BRF</h2>
    <p style="font-family:var(--mono);font-size:11px;color:var(--tx3);margin-bottom:22px">Cada empleado tiene su propio espacio</p>
    
    <div id="loginErr" style="display:none;" class="alert alert-danger"></div>
    
    <div class="form-group" style="margin-bottom:12px">
      <label for="loginEmail">EMAIL</label>
      <input type="email" id="loginEmail" class="form-control" placeholder="tu@email.com">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label for="loginPass">CONTRASEÑA</label>
      <input type="password" id="loginPass" class="form-control" placeholder="mínimo 6 caracteres" onkeydown="if(event.key==='Enter')loginSubmit()">
    </div>
    
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-primary" onclick="loginSubmit(false)" id="btnLogin">Ingresar</button>
      <button class="btn btn-secondary" onclick="loginSubmit(true)" id="btnRegister">Crear cuenta nueva</button>
    </div>
  </div>
</dialog>

<header class="topbar">
  <div class="logo">
    <div class="logo-icon">&#9201;</div>
    <div class="logo-text">JORNADA <span>BRF</span></div>
  </div>
  <div class="clock" id="liveClock" aria-live="polite">--:--:--</div>
  <button id="userBtn" class="btn btn-secondary" onclick="abrirUsuarios()" style="padding:4px 10px;font-size:10px;">👤 --</button>
  <div class="period-badge" id="periodBadge">cargando...</div>
</header>

<nav class="nav" aria-label="Navegación principal">
  <button class="nav-tab active" onclick="nav('dashboard')">Inicio</button>
  <button class="nav-tab" onclick="nav('registro')">Registros</button>
  <button class="nav-tab" onclick="nav('historial')">Historial</button>
  <button class="nav-tab" onclick="nav('simulador')">Planificar</button>
  <button class="nav-tab" onclick="nav('ia')" style="color:var(--green)">✦ IA</button>
</nav>

<dialog id="deleteModal">
  <div class="dialog-content" style="text-align: center;">
    <h3 style="font-family:var(--cond);font-size:16px;color:var(--red);margin-bottom:8px">Eliminar registro</h3>
    <p style="font-family:var(--mono);font-size:11px;color:var(--tx2);margin-bottom:20px">Esta acción no se puede deshacer.</p>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-danger" onclick="confirmDelete()">Eliminar</button>
      <button class="btn btn-secondary" onclick="document.getElementById('deleteModal').close();">Cancelar</button>
    </div>
  </div>
</dialog>

<main class="main-content">
  
  <section class="panel active" id="panel-dashboard" aria-labelledby="title-dashboard">
    <header class="sec-hdr">
      <h1 id="title-dashboard" class="sec-title">Vista General</h1>
      <div style="font-family:var(--mono);font-size:11px;color:var(--tx2)" id="dashDate">--</div>
    </header>
    
    <article class="card">
      <h2 class="card-title">Registrar jornada de hoy</h2>
      <input type="hidden" id="editId" value="">
      
      <div class="form-grid">
        <div class="form-group"><label>Fecha</label><input type="date" class="form-control" id="rFecha"></div>
      </div>
      <div class="form-grid">
        <div class="form-group"><label>Entrada</label><input type="time" class="form-control" id="rE" oninput="calcPrev()"></div>
        <div class="form-group"><label>Salida</label><input type="time" class="form-control" id="rS" oninput="calcPrev()"></div>
      </div>
      
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveReg()">Guardar</button>
        <button class="btn btn-secondary" onclick="clearReg()">Limpiar</button>
      </div>
    </article>
  </section>

</main>

<script>
// Tu lógica JS actual
</script>
</body>
</html>
