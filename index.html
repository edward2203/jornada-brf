<style>
:root {
  --bg:#0a0c0f; --sur:#111418; --sur2:#181c22; --sur3:#1f252e;
  --bdr:#252c38; --bdr2:#2e3847;
  --green:#00e676; --gm:rgba(0,230,118,.12); --gg:rgba(0,230,118,.3);
  --red:#ff4444; --rm:rgba(255,68,68,.12);
  --amb:#ffab40; --am:rgba(255,171,64,.12);
  --blu:#40c4ff; --bm:rgba(64,196,255,.12);
  --tx:#e8edf5; --tx2:#8a95a8; --tx3:#4a5568;
  --mono:'Share Tech Mono',monospace;
  --sans:'Barlow',sans-serif;
  --cond:'Barlow Condensed',sans-serif;
}

/* ── TEMA CLARO ── */
body.theme-light {
  --bg:#f0f4f8; --sur:#ffffff; --sur2:#e8edf5; --sur3:#dce3ed;
  --bdr:#c8d3e0; --bdr2:#b0bece;
  --green:#00a854; --gm:rgba(0,168,84,.1); --gg:rgba(0,168,84,.25);
  --red:#e53935; --rm:rgba(229,57,53,.1);
  --amb:#f57c00; --am:rgba(245,124,0,.1);
  --blu:#0288d1; --bm:rgba(2,136,209,.1);
  --tx:#1a2332; --tx2:#4a5a70; --tx3:#8a9ab0;
}
body.theme-light .topbar{background:rgba(240,244,248,.97)}
body.theme-light body::before{display:none}

/* ── TEMA AZUL (Navy) ── */
body.theme-blue {
  --bg:#0a0f1e; --sur:#0d1530; --sur2:#111c3d; --sur3:#162248;
  --bdr:#1e2d55; --bdr2:#263666;
  --green:#4fc3f7; --gm:rgba(79,195,247,.12); --gg:rgba(79,195,247,.3);
  --red:#ef5350; --rm:rgba(239,83,80,.12);
  --amb:#ffd54f; --am:rgba(255,213,79,.12);
  --blu:#80d8ff; --bm:rgba(128,216,255,.12);
  --tx:#e3f0ff; --tx2:#7a9cc0; --tx3:#3d5a80;
}
body.theme-blue .topbar{background:rgba(10,15,30,.97)}

/* ── TEMA VERDE MILITAR ── */
body.theme-military {
  --bg:#0d1208; --sur:#121a0c; --sur2:#182212; --sur3:#1e2a16;
  --bdr:#28380e; --bdr2:#334510;
  --green:#a3e635; --gm:rgba(163,230,53,.12); --gg:rgba(163,230,53,.3);
  --red:#f87171; --rm:rgba(248,113,113,.12);
  --amb:#fbbf24; --am:rgba(251,191,36,.12);
  --blu:#67e8f9; --bm:rgba(103,232,249,.12);
  --tx:#ecfccb; --tx2:#7a9a4a; --tx3:#3d5020;
}
body.theme-military .topbar{background:rgba(13,18,8,.97)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,230,118,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,230,118,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.topbar{position:sticky;top:0;z-index:100;background:rgba(10,12,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bdr);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{width:32px;height:32px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;aria-hidden="true"}
.logo-text{font-family:var(--cond);font-weight:700;font-size:17px;letter-spacing:.05em}
.logo-text span{color:var(--green)}
.clock{font-family:var(--mono);font-size:12px;color:var(--green);letter-spacing:.08em}
.period-badge{font-family:var(--mono);font-size:10px;color:var(--tx2);background:var(--sur2);border:1px solid var(--bdr);padding:3px 8px;border-radius:4px;white-space:nowrap}

/* ── NAVEGACIÓN RESPONSIVE ── */
.nav{display:flex;background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 16px;gap:2px;overflow-x:auto;scrollbar-width:none;position:relative;z-index:1}
.nav::-webkit-scrollbar{display:none}
.nav-tab{padding:12px 14px;font-family:var(--cond);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.nav-tab:hover{color:var(--tx2)}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green)}
.nav-tab.hi{color:var(--green)}

/* Botón hamburguesa (solo móvil) */
#navToggle{display:none;align-items:center;justify-content:center;width:36px;height:36px;background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;color:var(--tx2);cursor:pointer;font-size:18px}
#navToggle:hover{background:var(--sur3);color:var(--green)}
/* Menú móvil (off‑canvas) */
#mobileNav{position:fixed;top:0;right:-260px;width:260px;height:100vh;background:var(--sur);border-left:1px solid var(--bdr);flex-direction:column;padding:20px;box-sizing:border-box;transition:right .3s ease;z-index:1100}
#mobileNav.active{right:0}
#mobileNav .nav-tab{width:100%;margin:8px 0;padding:12px;text-align:left;justify-content:flex-start}
@media (max-width:768px){
  .nav{display:none;} /* Oculta barra horizontal */
  #navToggle{display:flex;} /* Muestra hamburguesa */
}
@media (min-width:769px){
  #mobileNav{display:none;} /* Oculta menú móvil en escritorio */
}

/* ── ESTILOS RESTANTES (igual que antes) ── */
.main{max-width:1080px;margin:0 auto;padding:24px 16px;position:relative;z-index:1}
.panel{display:none}.panel.active{display:block}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:20px;margin-bottom:18px}
.card-title{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--tx2);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:12px;background:var(--green);border-radius:2px;flex-shrink:0}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:18px}
.stat-box{background:var(--sur2);border:1px solid var(--bdr);border-radius:10px;padding:16px;text-align:center}
.stat-label{font-family:var(--mono);font-size:9px;color:var(--tx2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-family:var(--mono);font-size:22px;color:var(--tx)}
.stat-value.pos{color:var(--green)} .stat-value.neg{color:var(--red)}
.saldo-display{text-align:center;padding:28px;background:var(--sur2);border-radius:12px;border:1px solid var(--bdr2);margin-bottom:18px}
.saldo-label{font-family:var(--mono);font-size:10px;color:var(--tx2);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px}
.saldo-value{font-family:var(--mono);font-size:48px;letter-spacing:.03em;line-height:1}
.saldo-value.pos{color:var(--green);text-shadow:0 0 40px var(--gg)}
.saldo-value.neg{color:var(--red);text-shadow:0 0 40px rgba(255,68,68,.3)}
.saldo-pe
